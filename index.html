var YC = {"2019": "#e63946", "2020": "#f4a261", "2021": "#2a9d8f", "2022": "#6a4c93", "2023": "#1d7bd4", "2024": "#3cb44b"};
var YEARS = [2019,2020,2021,2022,2023,2024];

var map = L.map('map',{preferCanvas:true}).setView([40.7190,-73.9843],15);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OpenStreetMap &copy; CARTO',
  subdomains:'abcd', maxZoom:19
}).addTo(map);

// Legend
var leg = L.control({position:'bottomright'});
leg.onAdd = function() {
  var d = L.DomUtil.create('div','legend');
  d.innerHTML = '<b>Year planted</b>' + YEARS.map(function(y){
    return '<div class="li"><div class="lc" style="background:'+YC[y]+'"></div>'+y+'</div>';
  }).join('');
  return d;
};
leg.addTo(map);

var cache = {};
var layer = L.layerGroup().addTo(map);

function makeMarker(t, lat, lon) {
  var yr = t.yr || 0;
  var col = YC[yr] || '#888';
  return L.circleMarker([lat,lon],{
    radius: t.n > 1 ? Math.min(9, 5 + t.n) : 5,
    fillColor: col,
    color: 'rgba(0,0,0,0.2)',
    weight: 1,
    fillOpacity: 0.85
  }).bindPopup(
    '<div class="pt">'+t.display+'</div>'+
    '<div class="ps">'+t.sp+'</div>'+
    '<b>Year planted:</b> '+yr+
    (t.n > 1 ? '<br><b>Trees here:</b> '+t.n : '')
  );
}

function getActiveYears() {
  var chks = document.querySelectorAll('.yr-chk:checked');
  var yrs = {};
  chks.forEach(function(c){ yrs[+c.value] = true; });
  return yrs;
}

function toggleAll(cb) {
  document.querySelectorAll('.yr-chk').forEach(function(c){ c.checked = cb.checked; });
  applyFilters();
}

function onYearChange() {
  var chks = document.querySelectorAll('.yr-chk');
  var checked = document.querySelectorAll('.yr-chk:checked');
  document.getElementById('chk-all').checked = (chks.length === checked.length);
  applyFilters();
}

function applyFilters() {
  layer.clearLayers();
  var activeYrs = getActiveYears();
  var shown = 0;
  for (var i=0; i<TREES.length; i++) {
    var t = TREES[i];
    var coords = cache[t.geo];
    if (!coords) continue;
    if (!activeYrs[t.yr]) continue;
    layer.addLayer(makeMarker(t, coords[0], coords[1]));
    shown++;
  }
  document.getElementById('cnt').textContent = shown.toLocaleString()+' locations';
}

async function geocodeAll() {
  var total = TREES.length;
  var done = 0;
  var prog = document.getElementById('prog');
  for (var i = 0; i < TREES.length; i += 5) {
    var batch = TREES.slice(i, Math.min(i+5, TREES.length));
    await Promise.all(batch.map(async function(t) {
      try {
        var res = await fetch('https://geosearch.planninglabs.nyc/v2/search?text='+encodeURIComponent(t.geo)+'&size=1');
        var data = await res.json();
        if (data.features && data.features[0]) {
          var c = data.features[0].geometry.coordinates;
          cache[t.geo] = [c[1], c[0]];
          var activeYrs = getActiveYears();
          if (activeYrs[t.yr]) {
            layer.addLayer(makeMarker(t, c[1], c[0]));
          }
        }
      } catch(e) {}
      done++;
      prog.style.width = Math.round(done/total*100)+'%';
      document.getElementById('cnt').textContent = 'Geocoding '+done+' / '+total+'...';
    }));
    await new Promise(r => setTimeout(r, 50));
  }
  prog.style.background = '#3cb44b';
  applyFilters();
}

geocodeAll();
